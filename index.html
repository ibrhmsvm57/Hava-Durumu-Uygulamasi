<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Anlık Hava Durumu</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="weather-app">
        <h1>Hava Durumu Sorgula</h1>
        
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Şehir Adı Giriniz">
            <button id="search-btn">Ara</button>
        </div>
        
        <div class="weather-info" id="weather-display">
            <p>Bir şehir arayın ve hava durumunu görün.</p>
        </div>
    </div>

    <script src="script.js"></script> 
</body>
</html>
